<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ads দিয়ে ভিডিও আনলক</title>
    <!-- AdsGram SDK - সঠিকভাবে লোড হচ্ছে -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 30px 24px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #FFD166, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .sub {
            color: #bbb;
            font-size: 0.85rem;
            margin-bottom: 30px;
            border-bottom: 1px dashed #444;
            display: inline-block;
            padding-bottom: 6px;
        }

        .ad-btn {
            background: linear-gradient(90deg, #ff7b2c, #ff3a6f);
            border: none;
            width: 100%;
            padding: 18px 20px;
            border-radius: 100px;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(255, 58, 111, 0.4);
            margin-bottom: 20px;
        }

        .ad-btn:active {
            transform: scale(0.96);
        }

        .ad-btn.disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
        }

        .cooldown-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 60px;
            padding: 8px 15px;
            font-size: 0.8rem;
            color: #ffaa66;
            margin: 12px 0;
            display: inline-block;
        }

        .video-wrapper {
            margin-top: 25px;
            border-radius: 32px;
            overflow: hidden;
            background: #000;
            display: none;
        }

        video {
            width: 100%;
            max-height: 260px;
            display: block;
        }

        .status {
            font-size: 0.75rem;
            margin-top: 15px;
            padding: 8px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.5);
            color: #ddd;
        }

        .badge {
            font-size: 0.7rem;
            background: #2ecc71;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            margin-top: 12px;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 GRAM ADS</h1>
    <div class="sub">Ads দেখুন ➕ ভিডিও আনলক করুন</div>

    <button id="watchAdBtn" class="ad-btn">🎥 Ads দেখুন & ভিডিও পান</button>

    <div id="cooldownInfo" class="cooldown-box" style="display: none;">⏳ পরবর্তী Ads পেতে অপেক্ষা করুন...</div>

    <div id="videoContainer" class="video-wrapper">
        <video id="contentVideo" controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
        </video>
    </div>

    <div id="statusMessage" class="status">✅ প্রস্তুত | Ads দেখে কন্টেন্ট আনলক করুন</div>
    <div class="badge">⚡ Powered by AdsGram | Block ID: 25624</div>
</div>

<script>
    // ========== আপনার দেওয়া Block ID ==========
    const YOUR_BLOCK_ID = "25624";
    // =========================================

    let adController = null;
    let isCooldown = false;      // কুলডাউন সক্রিয় কিনা
    let cooldownTimer = null;
    let remainingCooldown = 0;   // বাকি সেকেন্ড
    
    // UI এলিমেন্টস
    const watchBtn = document.getElementById('watchAdBtn');
    const videoContainer = document.getElementById('videoContainer');
    const contentVideo = document.getElementById('contentVideo');
    const statusDiv = document.getElementById('statusMessage');
    const cooldownDiv = document.getElementById('cooldownInfo');
    
    // ========== কুলডাউন ফাংশন (৩০ সেকেন্ড) ==========
    function startCooldown(seconds = 30) {
        if (cooldownTimer) clearInterval(cooldownTimer);
        isCooldown = true;
        remainingCooldown = seconds;
        watchBtn.classList.add('disabled');
        cooldownDiv.style.display = 'block';
        
        cooldownTimer = setInterval(() => {
            if (remainingCooldown <= 1) {
                // কুলডাউন শেষ
                clearInterval(cooldownTimer);
                isCooldown = false;
                watchBtn.classList.remove('disabled');
                cooldownDiv.style.display = 'none';
                statusDiv.innerHTML = '✅ কুলডাউন শেষ! আপনি আবার Ads দেখতে পারেন।';
                setTimeout(() => {
                    if(statusDiv.innerHTML === '✅ কুলডাউন শেষ! আপনি আবার Ads দেখতে পারেন।')
                        statusDiv.innerHTML = '🎬 Ads দেখে নতুন ভিডিও আনলক করুন';
                }, 2000);
            } else {
                remainingCooldown--;
                cooldownDiv.innerHTML = `⏳ পরবর্তী Ads পেতে অপেক্ষা করুন : ${remainingCooldown} সেকেন্ড`;
            }
        }, 1000);
    }
    
    // ভিডিও লুকানোর ফাংশন (নতুন Ads দেখানোর আগে পুরনো ভিডিও লুকাবে)
    function hideVideo() {
        videoContainer.style.display = 'none';
        contentVideo.pause();
        // ভিডিও রিসেট না করলেও চলে, শুধু লুকালাম
    }
    
    // ভিডিও দেখানোর ফাংশন
    function showVideo() {
        videoContainer.style.display = 'block';
        contentVideo.load();   // রিলোড করতে পারে
        contentVideo.play().catch(e => console.log("Auto-play blocked, click play manually"));
    }
    
    // AdsGram ইনিশিয়ালাইজ (সঠিক ব্লক আইডি দিয়ে)
    try {
        adController = window.Adsgram.init({ blockId: YOUR_BLOCK_ID });
        console.log("AdsGram initialized with Block ID:", YOUR_BLOCK_ID);
        statusDiv.innerHTML = '✅ AdsGram রেডি | Ads দেখতে ক্লিক করুন';
    } catch (error) {
        console.error("Init error", error);
        statusDiv.innerHTML = '❌ AdsGram লোড হয়নি। ইন্টারনেট চেক করুন।';
        watchBtn.disabled = true;
        watchBtn.style.opacity = '0.5';
    }
    
    // ক্লিক ইভেন্ট
    watchBtn.addEventListener('click', function() {
        // কুলডাউন চললে ব্লক
        if (isCooldown) {
            statusDiv.innerHTML = `⚠️ দয়া করে ${remainingCooldown} সেকেন্ড অপেক্ষা করুন তারপর আবার Ads দেখুন।`;
            return;
        }
        
        if (!adController) {
            statusDiv.innerHTML = '❌ AdsGram কাজ করছে না, পেজ রিলোড করুন।';
            return;
        }
        
        // আগের ভিডিও লুকিয়ে ফেলি (নতুন Ads এর আগে)
        hideVideo();
        
        // বাটন ডিজেবল (ক্লিক করা বন্ধ)
        watchBtn.classList.add('disabled');
        statusDiv.innerHTML = '⏳ Ads লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...';
        
        // Ads দেখানোর মূল কল
        adController.show().then(() => {
            // ✅ Ads সফলভাবে দেখেছে
            statusDiv.innerHTML = '✅ ধন্যবাদ! আপনার ভিডিও এখন আনলক হয়েছে 🎉';
            
            // ভিডিও দেখাও
            showVideo();
            
            // কুলডাউন শুরু করো (৩০ সেকেন্ড)
            startCooldown(30);
            
            // বাটন আবার সক্রিয় হবে কুলডাউন শেষে (startCooldown এ handle করছে)
            // কিন্তু এখানে .disabled class startCooldown এর মধ্যে add হয়ে গেছে, তাই extra কিছু দরকার নেই
            
            // স্ট্যাটাস মেসেজ 3 সেকেন্ড পরে রিসেট (শুধু দেখানোর জন্য)
            setTimeout(() => {
                if(statusDiv.innerHTML.includes("আপনার ভিডিও এখন আনলক হয়েছে")) {
                    statusDiv.innerHTML = '🎬 আবার Ads দেখে নতুন ভিডিও আনলক করতে পারেন (কুলডাউন দেখুন)';
                }
            }, 4000);
            
        }).catch((err) => {
            // ❌ Ads স্কিপ বা Error
            console.error("Ad error:", err);
            statusDiv.innerHTML = '⚠️ Ads শেষ করতে হবে (স্কিপ করবেন না)। আবার চেষ্টা করুন।';
            // বাটন আবার সক্রিয় করো (কারণ কুলডাউন শুরু হয়নি)
            watchBtn.classList.remove('disabled');
            // ভিডিও দেখাবে না, কারণ Ads শেষ করেনি
        });
    });
    
    // পেজ লোড হলে যদি ভিডিও থাকে সেটা hidden ই থাকবে
    window.addEventListener('load', () => {
        hideVideo();
    });
</script>
</body>
</html>
